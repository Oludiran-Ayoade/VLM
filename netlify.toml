[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Configure Next.js serverless functions timeout
# Note: Free tier has 10s limit, Pro tier allows up to 26s
# We're setting this but it may require a paid plan
[functions]
  node_bundler = "esbuild"
